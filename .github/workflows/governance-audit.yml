name: governance-audit

on:
  schedule:
    - cron: "47 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: NightMadMax/new-project-rules
          ref: 6542aef810aa7558871266c3bd9323878a73f2e6
          path: .external/new-project-rules
          persist-credentials: false
      - name: Verify ruleset and sole owner-admin invariant
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          python3 .external/new-project-rules/scripts/check_github_governance.py
          --repository NightMadMax/best-practices
          --github-token-scope
